services:
  - type: web
    name: system-design-todo
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://system-design-todobackend-1.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
